name: "Synctacles Energy"
version: "0.4.40"
slug: "synctacles_energy"
description: "Real-time EU electricity prices with GO/WAIT/AVOID signals, 15 MQTT sensors, renewable energy tracking, and supplier price calibration for 28 countries"
url: "https://github.com/synctacles/energy-app"
documentation: "https://github.com/synctacles/energy-app/blob/main/DOCS.md"
arch:
  - amd64
  - aarch64
  - armv7
image: "ghcr.io/synctacles/{arch}-energy"
ingress: true
ingress_port: 8098
panel_icon: "mdi:lightning-bolt"
panel_title: "Synctacles Energy"
homeassistant_api: true
hassio_api: true
services:
  - mqtt:want
init: false
startup: application
boot: auto
map:
  - config:rw
options:
  pricing_mode: "auto"
  plan: ""
  zone: ""
  go_threshold: -15
  avoid_threshold: 20
  best_window_hours: 3
  alerts_enabled: false
  alert_threshold: 0.0
  coefficient: 0
  supplier_id: ""
  supplier_markup: 0
  manual_vat_rate: 0
  manual_energy_tax: 0
  manual_surcharges: 0
  manual_network_tariff: 0
  fixed_rate_price: 0
  p1_sensor_entity: ""
  power_sensor: ""
  telemetry_enabled: true
  disclaimer_accepted: false
  privacy_accepted: false
  onboarding_completed: false
  debug_mode: false
schema:
  pricing_mode: str
  plan: str
  zone: str
  go_threshold: float
  avoid_threshold: float
  best_window_hours: "int(1,8)"
  alerts_enabled: bool
  alert_threshold: float
  coefficient: float
  supplier_id: str
  supplier_markup: float
  manual_vat_rate: float
  manual_energy_tax: float
  manual_surcharges: float
  manual_network_tariff: float
  fixed_rate_price: float
  p1_sensor_entity: str
  power_sensor: str
  telemetry_enabled: bool
  disclaimer_accepted: bool
  privacy_accepted: bool
  onboarding_completed: bool
  debug_mode: bool
changelog: |
  ## 0.4.0
  - Energy-Charts as primary source for 26 EU zones, ENTSO-E fallback
  - 5 pricing modes: Auto, Manual, External Sensor, P1 Meter, Meter Tariff
  - Renewable energy share sensor + green energy binary sensor
  - Supplier delta calibration for 22 NL suppliers
  - 15 MQTT sensors (up from 11)
  - Green energy automation blueprint
  - 5-tier source fallback (Energy-Charts → ENTSO-E → Elering → Elexon → zone correlation)
  - 28 countries, 46 bidding zones
  - HA addon translations (8 languages)
  ## 0.3.x-beta
  - Fixed-rate pricing mode
  - Zone auto-detect via HA timezone
  - Automation blueprints (GO, AVOID, Price Alert, Best Window)
  - i18n: 8 languages (da, de, en, es, fi, fr, nl, pt)
  - Disclaimer and privacy modals
  - MQTT auto-reconnect on broken pipe
  - 100% autonomous — no account or registration needed
  ## 0.2.x-beta
  - Plan selector: one-click setup per country
  - Renamed "Addon" to "App" throughout UI
  ## 0.1.0-beta
  - Initial public beta
  - Real-time EU electricity prices with GO/WAIT/AVOID
  - Best charging window detection
  - Local fallback with 48h cached data
  - Price alerts via HA notification
  - 100% free — all features, no account needed
